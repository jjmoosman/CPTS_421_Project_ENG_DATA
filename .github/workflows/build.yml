name: Build Executables

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # ✅ Unified Python setup (works on BOTH OS)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # ✅ Create virtual environment (cross-platform)
      - name: Create virtual environment
        shell: bash
        run: |
          python -m venv venv
          if [ "$RUNNER_OS" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
          fi
          python -m pip install --upgrade pip

      # ✅ Install dependencies
      - name: Install dependencies
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            source venv/Scripts/activate
          else
            source venv/bin/activate
            brew install create-dmg
          fi

          pip install pyinstaller PyQt6 pandas rapidfuzz pymupdf python-docx openpyxl numpy

      # ✅ Build with PyInstaller
      - name: Build with PyInstaller
        shell: bash
        working-directory: ./code/TestApp
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            source ../../venv/Scripts/activate
          else
            source ../../venv/bin/activate
            export MACOSX_DEPLOYMENT_TARGET=11.0
          fi

          pyinstaller --onefile --windowed \
            --name "FERPA_Redactor" \
            --collect-all pandas \
            --collect-all numpy \
            --collect-all rapidfuzz \
            --collect-all PyQt6 \
            --hidden-import=PyQt6.sip \
            app.py

      # ✅ Create macOS DMG
      - name: Create macOS DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p dmg_root
          cp -r code/TestApp/dist/FERPA_Redactor.app dmg_root/
          chmod +x "dmg_root/FERPA_Redactor.app/Contents/MacOS/FERPA_Redactor"

          create-dmg \
            --volname "FERPA Redactor Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "FERPA_Redactor.app" 175 190 \
            --hide-extension "FERPA_Redactor.app" \
            --app-drop-link 425 190 \
            "FERPA_Redactor_Mac.dmg" \
            "dmg_root/"

      # ✅ Upload Windows artifact
      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FERPA-Tool-Windows
          path: code/TestApp/dist/*.exe

      # ✅ Upload macOS artifact
      - name: Upload Mac Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FERPA-Tool-MacOS-Installer
          path: FERPA_Redactor_Mac.dmg
