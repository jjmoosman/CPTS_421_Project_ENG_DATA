name: Build Executables
on: [push]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false  # Prevents Windows failing from canceling the Mac build
      matrix:
        # Use macos-14 to ensure it's on an ARM/M1 runner with Node 24 support
        os: [windows-latest, macos-14] 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # v4 is Node 24 compatible

      - name: Set up Python
        uses: actions/setup-python@v5 # v5 is Node 24 compatible
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 pandas rapidfuzz pymupdf python-docx openpyxl numpy

      - name: Build with PyInstaller
        run: |
          pyinstaller --onefile --windowed \
          --name "FERPA_Redactor" \
          --collect-all pandas \
          --collect-all numpy \
          --collect-all rapidfuzz \
          app.py
        working-directory: ./code/TestApp

      - name: Zip Mac App
        if: matrix.os == 'macos-14'
        run: |
          cd code/TestApp/dist
          zip -r ../../../FERPA_Redactor_Mac.zip FERPA_Redactor.app
        shell: bash

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4 # v4 is the newest stable version
        with:
          name: FERPA-Tool-${{ matrix.os }}
          path: |
            code/TestApp/dist/*.exe
            FERPA_Redactor_Mac.zip
