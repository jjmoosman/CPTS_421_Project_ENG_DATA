name: Build Executables

on: [push]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-14]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          # Removed 'architecture: x64' to let the runner use its native stable version

      - name: Install dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install create-dmg
            # We install the standard packages, but PyInstaller will handle the heavy lifting
            pip install pyinstaller PyQt6 pandas rapidfuzz pymupdf python-docx openpyxl numpy
          else
            pip install pyinstaller PyQt6 pandas rapidfuzz pymupdf python-docx openpyxl numpy
          fi

      - name: Build with PyInstaller
        shell: bash
        working-directory: ./code/TestApp
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            # Use the 'universal2' target to ensure it runs on Intel VMs and M-series Macs
            export MACOSX_DEPLOYMENT_TARGET=11.0
            pyinstaller --onefile --windowed \
            --name "FERPA_Redactor" \
            --target-arch universal2 \
            --collect-all pandas \
            --collect-all numpy \
            --collect-all rapidfuzz \
            --hidden-import=PyQt6.sip \
            app.py
          else
            pyinstaller --onefile --windowed \
            --name "FERPA_Redactor" \
            --collect-all pandas \
            --collect-all numpy \
            --collect-all rapidfuzz \
            --hidden-import=PyQt6.sip \
            app.py
          fi

      - name: Create macOS DMG
        if: matrix.os == 'macos-14'
        shell: bash
        run: |
          mkdir -p dmg_root
          # Copy the .app bundle created by PyInstaller
          cp -r code/TestApp/dist/FERPA_Redactor.app dmg_root/
          
          # Fix permissions inside the bundle
          chmod +x "dmg_root/FERPA_Redactor.app/Contents/MacOS/FERPA_Redactor"
          
          # Create the professional installer
          create-dmg \
            --volname "FERPA Redactor Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "FERPA_Redactor.app" 175 190 \
            --hide-extension "FERPA_Redactor.app" \
            --app-drop-link 425 190 \
            "FERPA_Redactor_Mac.dmg" \
            "dmg_root/"

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FERPA-Tool-Windows
          path: code/TestApp/dist/*.exe

      - name: Upload Mac Artifact
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: FERPA-Tool-MacOS-Installer
          path: FERPA_Redactor_Mac.dmg
