name: Build Executables
on: [push]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false 
      matrix:
        os: [windows-latest, macos-14] 

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller PyQt6 pandas rapidfuzz pymupdf python-docx openpyxl numpy

      - name: Build with PyInstaller
        # shell: bash makes path handling consistent across Win and Mac
        shell: bash
        run: |
          pyinstaller --onefile --windowed \
          --name "FERPA_Redactor" \
          --collect-all pandas \
          --collect-all numpy \
          --collect-all rapidfuzz \
          --hidden-import=PyQt6.sip \
          app.py
        working-directory: ./code/TestApp

      # Preserve Mac permissions by zipping the .app bundle
      - name: Zip Mac App
        if: matrix.os == 'macos-14'
        run: |
          cd code/TestApp/dist
          zip -r ../../../FERPA_Redactor_Mac.zip FERPA_Redactor.app
        shell: bash

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FERPA-Tool-Windows
          path: code/TestApp/dist/*.exe

      - name: Upload Mac Artifact
        if: matrix.os == 'macos-14'
        uses: actions/upload-artifact@v4
        with:
          name: FERPA-Tool-MacOS
          path: FERPA_Redactor_Mac.zip
