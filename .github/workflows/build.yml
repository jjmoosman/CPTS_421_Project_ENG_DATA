name: Build Executables

on: [push]

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # Using 'latest' keeps your project modern and forward-compatible
        os: [windows-latest, macos-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python (Windows)
        if: matrix.os == 'windows-latest'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Python (Mac - Hybrid Fix)
        if: matrix.os == 'macos-latest'
        run: |
          # We use Homebrew to get a 'clean' Python 3.10 that works on ARM64 runners
          brew install python@3.10
          echo "/opt/homebrew/opt/python@3.10/bin" >> $GITHUB_PATH
          # Link it so 'python' and 'pip' commands point to 3.10
          brew link --overwrite python@3.10

      - name: Install dependencies
        shell: bash
        run: |
          python3 -m pip install --upgrade pip
          if [ "$RUNNER_OS" == "macOS" ]; then
            brew install create-dmg
            pip3 install pyinstaller PyQt6 pandas rapidfuzz pymupdf python-docx openpyxl numpy
          else
            pip install pyinstaller PyQt6 pandas rapidfuzz pymupdf python-docx openpyxl numpy
          fi

      - name: Build with PyInstaller
        shell: bash
        working-directory: ./code/TestApp
        run: |
          if [ "$RUNNER_OS" == "macOS" ]; then
            export MACOSX_DEPLOYMENT_TARGET=11.0
            # Universal2 ensures the output works on BOTH Intel and M-series
            pyinstaller --onefile --windowed \
            --name "FERPA_Redactor" \
            --target-arch universal2 \
            --collect-all pandas \
            --collect-all numpy \
            --collect-all rapidfuzz \
            --hidden-import=PyQt6.sip \
            app.py
          else
            pyinstaller --onefile --windowed \
            --name "FERPA_Redactor" \
            --collect-all pandas \
            --collect-all numpy \
            --collect-all rapidfuzz \
            --hidden-import=PyQt6.sip \
            app.py
          fi

      - name: Create macOS DMG
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          mkdir -p dmg_root
          cp -r code/TestApp/dist/FERPA_Redactor.app dmg_root/
          chmod +x "dmg_root/FERPA_Redactor.app/Contents/MacOS/FERPA_Redactor"
          
          create-dmg \
            --volname "FERPA Redactor Installer" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "FERPA_Redactor.app" 175 190 \
            --hide-extension "FERPA_Redactor.app" \
            --app-drop-link 425 190 \
            "FERPA_Redactor_Mac.dmg" \
            "dmg_root/"

      - name: Upload Windows Artifact
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FERPA-Tool-Windows
          path: code/TestApp/dist/*.exe

      - name: Upload Mac Artifact
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: FERPA-Tool-MacOS-Installer
          path: FERPA_Redactor_Mac.dmg
